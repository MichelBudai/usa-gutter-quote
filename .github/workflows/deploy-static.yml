name: Deploy gutter static site
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx next build
        env:
          SITE_SLUG: gutter
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf "%s\n" "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - run: ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /var/www/gutter-static"
      - run: rsync -az --delete ./out/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/gutter-static/"
      - run: ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "nginx -t && systemctl reload nginx"
